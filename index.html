<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlassExam Pro | Nour Nady</title>
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons - Fixed Version -->
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        
        window.Firebase = { initializeApp, getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, serverTimestamp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            transition: background-color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
        
        /* يجعل الناف بار خلف المحتوى عند التمرير */
        .navbar-custom {
            z-index: 10 !important;
        }
        .content-custom {
            z-index: 20 !important;
            position: relative;
        }

        @media (max-width: 640px) {
            .text-5xl { font-size: 2.2rem; }
            .p-10 { padding: 1.25rem; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'glass-exam-pro-v2';

        const app = Firebase.initializeApp(firebaseConfig);
        const auth = Firebase.getAuth(app);
        const db = Firebase.getFirestore(app);

        // Helper to refresh icons
        const refreshIcons = () => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        };

        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass rounded-3xl shadow-2xl ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = "primary", className = "", disabled = false }) => {
            const variants = {
                primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-500/30",
                secondary: "bg-white/10 hover:bg-white/20 text-indigo-600 dark:text-white backdrop-blur-md",
                danger: "bg-red-500 hover:bg-red-600 text-white",
            };
            return (
                <button 
                    disabled={disabled}
                    onClick={onClick}
                    className={`px-6 py-2.5 rounded-2xl transition-all duration-300 active:scale-95 disabled:opacity-50 font-bold ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [view, setView] = useState('home'); 
            const [subjects, setSubjects] = useState([]);
            const [exams, setExams] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [readNotifications, setReadNotifications] = useState(() => JSON.parse(localStorage.getItem('read_notifs') || '[]'));
            const [activeSubject, setActiveSubject] = useState(null);
            const [currentExamData, setCurrentExamData] = useState(null);
            const [showNotificationCenter, setShowNotificationCenter] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await Firebase.signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await Firebase.signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                    }
                };
                initAuth();
                const unsubscribe = Firebase.onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSub = Firebase.onSnapshot(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'subjects'), (snap) => {
                    setSubjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => console.log(err));

                const unsubExam = Firebase.onSnapshot(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'exams'), (snap) => {
                    setExams(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => console.log(err));

                const unsubNotif = Firebase.onSnapshot(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), (snap) => {
                    setNotifications(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => console.log(err));

                return () => { unsubSub(); unsubExam(); unsubNotif(); };
            }, [user]);

            useEffect(() => {
                refreshIcons();
            }, [view, subjects, exams, showNotificationCenter, darkMode]);

            const markNotifRead = (id) => {
                const updated = [...readNotifications, id];
                setReadNotifications(updated);
                localStorage.setItem('read_notifs', JSON.stringify(updated));
            };

            const unreadNotifs = notifications.filter(n => !readNotifications.includes(n.id));

            return (
                <div className={`${darkMode ? 'dark bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'} min-h-screen transition-all duration-500 pb-10`}>
                    <div className="fixed inset-0 overflow-hidden pointer-events-none opacity-50">
                        <div className="absolute top-[-10%] left-[-10%] w-64 md:w-96 h-64 md:h-96 bg-indigo-500/10 rounded-full blur-[80px]" />
                    </div>

                    <nav className="sticky top-0 navbar-custom p-2 md:p-4">
                        <GlassCard className="max-w-7xl mx-auto flex items-center justify-between px-4 md:px-6 py-3 md:py-4">
                            <div className="flex items-center gap-2 md:gap-3 cursor-pointer group" onClick={() => isAdmin ? setView('admin-dashboard') : setView('admin-login')}>
                                <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-xl group-active:scale-90 transition-transform">
                                    <Icon name="graduation-cap" size={20} className="md:w-6 md:h-6" />
                                </div>
                                <h1 className="text-lg md:text-xl font-black tracking-tight">Nour Nady Pro</h1>
                            </div>

                            <div className="flex items-center gap-2 md:gap-4">
                                <div className="relative">
                                    <button onClick={() => setShowNotificationCenter(!showNotificationCenter)} className="p-2 md:p-2.5 hover:bg-indigo-500/10 rounded-full relative">
                                        <Icon name="bell" size={20} />
                                        {unreadNotifs.length > 0 && <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>}
                                    </button>
                                    <AnimatePresence>
                                        {showNotificationCenter && (
                                            <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 15 }} className="absolute left-0 mt-4 w-72 md:w-80 z-50">
                                                <GlassCard className="p-4 bg-white/95 dark:bg-slate-900/95 max-h-[400px] overflow-y-auto custom-scrollbar shadow-2xl">
                                                    <h3 className="text-sm font-black mb-4 pb-2 border-b border-black/5 dark:border-white/5 flex justify-between">الإشعارات <span>{unreadNotifs.length}</span></h3>
                                                    {unreadNotifs.length === 0 ? <p className="text-xs opacity-50 text-center py-10">كل شيء هادئ هنا..</p> : 
                                                        unreadNotifs.map(n => (
                                                            <div key={n.id} onClick={() => markNotifRead(n.id)} className="text-xs p-3 hover:bg-indigo-500/10 rounded-2xl cursor-pointer mb-2 transition-all">
                                                                <p className="font-bold mb-1">{n.title}</p>
                                                                <p className="opacity-70 leading-relaxed">{n.message}</p>
                                                            </div>
                                                        ))
                                                    }
                                                </GlassCard>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 md:p-2.5 hover:bg-indigo-500/10 rounded-full">
                                    {darkMode ? <Icon name="sun" size={20} /> : <Icon name="moon" size={20} />}
                                </button>
                                {isAdmin && (
                                    <div className="flex items-center gap-2 bg-indigo-600/20 px-3 py-1.5 rounded-full border border-indigo-500/20">
                                        <Icon name="shield-check" size={14} className="text-indigo-500" />
                                        <button onClick={(e) => { e.stopPropagation(); setIsAdmin(false); setView('home'); }} className="hover:text-red-500 transition-colors"><Icon name="log-out" size={14}/></button>
                                    </div>
                                )}
                            </div>
                        </GlassCard>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 content-custom">
                        <AnimatePresence mode="wait">
                            {view === 'home' && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                    <div className="col-span-full mb-10 text-center md:text-right">
                                        <h2 className="text-3xl md:text-5xl font-black mb-4">أهلاً بك في مستقبلك</h2>
                                        <p className="opacity-60 text-lg md:text-xl font-medium">اختر المادة وابدأ رحلة التفوق</p>
                                    </div>
                                    {subjects.map(s => (
                                        <div key={s.id} onClick={() => { setActiveSubject(s); setView('exam-list'); }} className="cursor-pointer group">
                                            <GlassCard className="p-6 md:p-10 border-r-8 border-r-indigo-600 h-full flex flex-col justify-between transition-all duration-500 group-hover:-translate-y-2 active:scale-95">
                                                <div>
                                                    <div className="w-12 h-12 md:w-16 md:h-16 bg-indigo-600/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all"><Icon name="file-text" size={28} /></div>
                                                    <h3 className="text-2xl md:text-3xl font-black mb-2">{s.name}</h3>
                                                </div>
                                                <div className="mt-8 flex items-center gap-3 text-indigo-500 font-black text-sm">اكتشف الامتحانات <Icon name="chevron-left" size={16} /></div>
                                            </GlassCard>
                                        </div>
                                    ))}
                                    {subjects.length === 0 && <div className="col-span-full text-center py-20 opacity-40 font-bold">جاري تحميل المحتوى...</div>}
                                </motion.div>
                            )}

                            {view === 'exam-list' && (
                                <motion.div initial={{ opacity: 0, x: 30 }} animate={{ opacity: 1, x: 0 }}>
                                    <button onClick={() => setView('home')} className="flex items-center gap-2 mb-10 font-bold opacity-60 hover:opacity-100"><Icon name="chevron-right" /> العودة</button>
                                    <h2 className="text-3xl md:text-4xl font-black mb-10">امتحانات {activeSubject?.name}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                        {exams.filter(e => e.subjectId === activeSubject?.id).map(e => (
                                            <GlassCard key={e.id} className="p-6 md:p-8">
                                                <h3 className="text-xl md:text-2xl font-black mb-6">{e.title}</h3>
                                                <div className="flex items-center gap-6 text-xs font-bold opacity-60 mb-8">
                                                    <span className="flex items-center gap-2"><Icon name="clock" size={14}/> {e.questions.length * 2} دقيقة</span>
                                                    <span className="flex items-center gap-2"><Icon name="file-text" size={14}/> {e.questions.length} سؤال</span>
                                                </div>
                                                <Button onClick={() => { setCurrentExamData(e); setView('taking-exam'); }} className="w-full py-4">دخول الامتحان</Button>
                                            </GlassCard>
                                        ))}
                                        {exams.filter(e => e.subjectId === activeSubject?.id).length === 0 && <p className="col-span-full text-center py-10 opacity-50 font-bold">لا توجد امتحانات متاحة حالياً.</p>}
                                    </div>
                                </motion.div>
                            )}

                            {view === 'taking-exam' && <ExamRunner exam={currentExamData} user={user} onFinish={(res) => { setView('results'); setCurrentExamData({ ...currentExamData, results: res }); }} />}
                            {view === 'results' && <ExamResultView data={currentExamData} onClose={() => setView('home')} />}
                            {view === 'admin-login' && <AdminLogin onLogin={() => { setIsAdmin(true); setView('admin-dashboard'); }} onCancel={() => setView('home')} />}
                            {view === 'admin-dashboard' && <AdminDashboard subjects={subjects} exams={exams} user={user} setView={setView} />}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        function ExamRunner({ exam, user, onFinish }) {
            const [idx, setIdx] = useState(0);
            const [ans, setAns] = useState({});
            const [sec, setSec] = useState(0);

            useEffect(() => {
                const t = setInterval(() => setSec(s => s + 1), 1000);
                return () => clearInterval(t);
            }, []);

            const format = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

            const finish = async () => {
                const report = exam.questions.map((q, i) => {
                    let isCorrect = false;
                    if (q.type === 'essay') {
                        isCorrect = (ans[i] || '').trim().toLowerCase() === (q.correct || '').trim().toLowerCase();
                    } else {
                        isCorrect = ans[i] === q.correct;
                    }
                    return { ...q, userAnswer: ans[i], isCorrect };
                });
                const score = report.filter(r => r.isCorrect).length;
                try {
                    const examRef = Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id);
                    await Firebase.updateDoc(examRef, { entryCount: (exam.entryCount || 0) + 1 });
                } catch(e){}
                onFinish({ score, total: exam.questions.length, report, time: format(sec) });
            };

            const q = exam.questions[idx];
            const abcd = ['A', 'B', 'C', 'D'];
            useEffect(() => refreshIcons(), [idx]);

            return (
                <div className="max-w-3xl mx-auto">
                    <div className="flex justify-between items-center mb-10">
                        <GlassCard className="px-6 py-3 font-black text-indigo-600 flex items-center gap-3 border-indigo-500/30">
                            <Icon name="clock" className="animate-pulse" /> {format(sec)}
                        </GlassCard>
                        <span className="font-black text-xl opacity-40">السؤال {idx + 1} / {exam.questions.length}</span>
                    </div>
                    <GlassCard className="p-6 md:p-10 mb-10 min-h-[450px] border-t-8 border-t-indigo-600">
                        <h3 className="text-xl md:text-3xl font-black mb-12 text-right leading-relaxed">{q.text}</h3>
                        <div className="grid gap-4">
                            {(!q.type || q.type === 'mcq') && q.options.map((opt, i) => (
                                <button key={i} onClick={() => setAns({...ans, [idx]: abcd[i]})} className={`w-full p-6 rounded-3xl border-2 transition-all flex items-center justify-between group ${ans[idx] === abcd[i] ? 'bg-indigo-600 border-indigo-600 text-white shadow-2xl scale-[1.01]' : 'border-white/10 hover:border-indigo-500/40 hover:bg-indigo-500/5'}`}>
                                    <div className="flex items-center gap-5">
                                        <span className={`w-10 h-10 rounded-2xl flex items-center justify-center font-black text-lg ${ans[idx] === abcd[i] ? 'bg-white text-indigo-600' : 'bg-indigo-600/10 text-indigo-600'}`}>{abcd[i]}</span>
                                        <span className="text-xl font-bold">{opt}</span>
                                    </div>
                                    {ans[idx] === abcd[i] && <Icon name="check-circle-2" />}
                                </button>
                            ))}
                            {q.type === 'tf' && ['صح', 'خطأ'].map((opt, i) => (
                                <button key={i} onClick={() => setAns({...ans, [idx]: opt})} className={`w-full p-6 rounded-3xl border-2 transition-all flex items-center justify-between ${ans[idx] === opt ? 'bg-indigo-600 border-indigo-600 text-white shadow-2xl scale-[1.01]' : 'border-white/10 hover:border-indigo-500/40'}`}>
                                    <span className="text-xl font-bold">{opt}</span>
                                    {ans[idx] === opt && <Icon name="check-circle-2" />}
                                </button>
                            ))}
                            {q.type === 'essay' && (
                                <textarea className="w-full bg-white/5 border-2 border-white/10 rounded-3xl p-6 outline-none focus:border-indigo-600 text-xl font-bold h-48 custom-scrollbar" placeholder="اكتب إجابتك هنا..." value={ans[idx] || ''} onChange={e => setAns({...ans, [idx]: e.target.value})} />
                            )}
                        </div>
                    </GlassCard>
                    <div className="flex justify-between gap-4">
                        <Button variant="secondary" onClick={() => setIdx(p => p - 1)} disabled={idx === 0} className="px-10">السابق</Button>
                        {idx === exam.questions.length - 1 ? <Button onClick={finish} className="px-16">إرسال</Button> : <Button onClick={() => setIdx(p => p + 1)} className="px-16">التالي</Button>}
                    </div>
                </div>
            );
        }

        function ExamResultView({ data, onClose }) {
            const { results } = data;
            const percent = Math.round((results.score / results.total) * 100);
            useEffect(() => refreshIcons(), []);

            return (
                <div className="max-w-4xl mx-auto pb-20">
                    <div className="text-center mb-16">
                        <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="inline-block p-10 rounded-full bg-indigo-600/10 mb-8"><Icon name="graduation-cap" size={60} className="text-indigo-600" /></motion.div>
                        <h2 className="text-5xl font-black mb-6">مبارك الإنجاز!</h2>
                        <div className="flex justify-center gap-12">
                            <div className="text-center"><p className="text-xs font-bold opacity-40 mb-1">درجتك</p><p className="text-5xl font-black text-indigo-600">{results.score} <span className="text-xl opacity-40">/ {results.total}</span></p></div>
                            <div className="text-center"><p className="text-xs font-bold opacity-40 mb-1">النسبة</p><p className="text-5xl font-black text-indigo-600">{percent}%</p></div>
                        </div>
                    </div>
                    <div className="space-y-10">
                        <h3 className="text-2xl font-black flex items-center gap-3"><Icon name="eye" className="text-indigo-600" /> مراجعة الأداء</h3>
                        {results.report.map((r, i) => (
                            <GlassCard key={i} className={`p-10 border-r-[12px] ${r.isCorrect ? 'border-r-green-500' : 'border-r-red-500'}`}>
                                <h4 className="text-2xl font-black mb-8 leading-relaxed text-right">{i + 1}. {r.text}</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                    <div className={`p-6 rounded-3xl border-2 ${r.isCorrect ? 'bg-green-500/5 border-green-500/20' : 'bg-red-500/5 border-red-500/20'}`}>
                                        <p className="text-[10px] font-black opacity-40 mb-2 uppercase">إجابتك</p>
                                        <div className="flex items-center justify-between">
                                            <span className={`text-xl font-black ${r.isCorrect ? 'text-green-600' : 'text-red-600'}`}>{r.userAnswer || 'لا يوجد'}</span>
                                            {r.isCorrect ? <Icon name="check-circle-2" size={18} className="text-green-600" /> : <Icon name="x-circle" size={18} className="text-red-600" />}
                                        </div>
                                    </div>
                                    <div className="p-6 rounded-3xl border-2 bg-green-500/5 border-green-500/20">
                                        <p className="text-[10px] font-black opacity-40 mb-2 uppercase">الإجابة النموذجية</p>
                                        <span className="text-xl font-black text-green-600">{r.correct}</span>
                                    </div>
                                </div>
                                {r.explanation && (
                                    <div className="flex gap-4 p-6 bg-indigo-600/5 rounded-3xl border border-indigo-600/10 italic opacity-80">
                                        <Icon name="info" size={20} className="text-indigo-600 shrink-0" />
                                        <p className="text-lg">"{r.explanation}"</p>
                                    </div>
                                )}
                            </GlassCard>
                        ))}
                    </div>
                    <div className="text-center mt-20"><Button onClick={onClose} className="px-20 py-5 text-xl">العودة للرئيسية</Button></div>
                </div>
            );
        }

        function AdminLogin({ onLogin, onCancel }) {
            const [p, setP] = useState('');
            const [error, setError] = useState('');

            const handleLogin = () => {
                if (p === "nournady2007") {
                    onLogin();
                } else {
                    setError('كلمة المرور غير صحيحة');
                }
            };

            return (
                <div className="max-w-md mx-auto pt-20">
                    <GlassCard className="p-12 text-center">
                        <Icon name="shield-check" size={60} className="text-indigo-600 mx-auto mb-8" />
                        <h2 className="text-3xl font-black mb-8">لوحة الإدارة</h2>
                        <input type="password" placeholder="كلمة السر" className="w-full bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-5 outline-none mb-4 text-center text-3xl tracking-[0.3em] focus:border-indigo-600" value={p} onChange={e => setP(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
                        {error && <p className="text-red-500 font-bold mb-4">{error}</p>}
                        <Button className="w-full py-5 text-xl mb-4" onClick={handleLogin}>تأكيد</Button>
                        <button onClick={onCancel} className="text-sm font-bold opacity-40 hover:opacity-100">إلغاء</button>
                    </GlassCard>
                </div>
            );
        }

        function AdminDashboard({ subjects, exams, user, setView }) {
            const [tab, setTab] = useState('stats'); 
            const [newSub, setNewSub] = useState('');
            const [selSub, setSelSub] = useState('');
            const [eTitle, setETitle] = useState('');
            const [qs, setQs] = useState([]);
            const [qt, setQt] = useState('');
            const [qo, setQo] = useState(['', '', '', '']);
            const [qc, setQc] = useState('A');
            const [qe, setQe] = useState('');
            const [qType, setQType] = useState('mcq');
            const [qcTf, setQcTf] = useState('صح');
            const [qeModel, setQeModel] = useState('');
            const [editSubId, setEditSubId] = useState(null);
            const [editSubName, setEditSubName] = useState('');
            const [editingExamId, setEditingExamId] = useState(null);

            const addS = async () => { if(newSub) await Firebase.addDoc(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'subjects'), { name: newSub }); setNewSub(''); };
            const delS = async (id) => await Firebase.deleteDoc(Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'subjects', id));
            const saveEditSub = async (id) => { if(editSubName) await Firebase.updateDoc(Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'subjects', id), { name: editSubName }); setEditSubId(null); };
            const delE = async (id) => await Firebase.deleteDoc(Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'exams', id));
            
            const editE = (e) => { 
                setEditingExamId(e.id); 
                setSelSub(e.subjectId); 
                setETitle(e.title); 
                setQs(e.questions || []); 
                setTab('add'); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const addQ = () => {
                if(!qt) return;
                let finalOptions = [];
                let finalCorrect = '';
                if(qType === 'mcq') { finalOptions = qo; finalCorrect = qc; }
                else if(qType === 'tf') { finalOptions = ['صح', 'خطأ']; finalCorrect = qcTf; }
                else if(qType === 'essay') { finalOptions = []; finalCorrect = qeModel; }

                setQs([...qs, { type: qType, text: qt, options: finalOptions, correct: finalCorrect, explanation: qe }]);
                setQt(''); setQe(''); setQo(['', '', '', '']); setQc('A'); setQcTf('صح'); setQeModel('');
                refreshIcons();
            };

            const saveE = async () => {
                if(!selSub || !eTitle || qs.length === 0) return;
                if(editingExamId) {
                    await Firebase.updateDoc(Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'exams', editingExamId), { subjectId: selSub, title: eTitle, questions: qs });
                    setEditingExamId(null);
                } else {
                    await Firebase.addDoc(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { subjectId: selSub, title: eTitle, questions: qs, entryCount: 0, createdAt: Firebase.serverTimestamp() });
                    await Firebase.addDoc(Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), { title: 'امتحان جديد!', message: `${eTitle}`, createdAt: Firebase.serverTimestamp() });
                }
                setTab('stats'); setQs([]); setETitle(''); setSelSub('');
            };
            
            const cancelEditE = () => { setEditingExamId(null); setQs([]); setETitle(''); setSelSub(''); };
            useEffect(() => refreshIcons(), [tab, qs]);

            return (
                <div className="flex flex-col lg:flex-row gap-10">
                    <GlassCard className="lg:w-1/4 p-6 h-fit space-y-3 sticky top-24">
                        <button onClick={() => setTab('stats')} className={`w-full p-5 rounded-2xl text-right flex items-center gap-4 font-black transition-all ${tab === 'stats' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-indigo-500/10'}`}>
                            <Icon name="layout-dashboard" /> الإحصائيات
                        </button>
                        <button onClick={() => setTab('manage')} className={`w-full p-5 rounded-2xl text-right flex items-center gap-4 font-black transition-all ${tab === 'manage' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-indigo-500/10'}`}>
                            <Icon name="settings" /> المواد
                        </button>
                        <button onClick={() => setTab('add')} className={`w-full p-5 rounded-2xl text-right flex items-center gap-4 font-black transition-all ${tab === 'add' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-indigo-500/10'}`}>
                            <Icon name="file-text" /> {editingExamId ? 'تعديل' : 'رفع'} امتحان
                        </button>
                    </GlassCard>

                    <div className="lg:w-3/4">
                        {tab === 'stats' && (
                            <div className="space-y-6">
                                {exams.map(e => (
                                    <GlassCard key={e.id} className="p-8 flex justify-between items-center border-l-8 border-l-indigo-600">
                                        <div>
                                            <p className="text-xs font-black opacity-40 mb-1">{subjects.find(s => s.id === e.subjectId)?.name}</p>
                                            <h4 className="font-black text-2xl">{e.title}</h4>
                                        </div>
                                        <div className="flex items-center gap-8">
                                            <div className="text-center"><p className="text-[10px] font-black opacity-40">دخول</p><span className="text-2xl font-black text-indigo-600">{e.entryCount || 0}</span></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => editE(e)} className="text-indigo-400 p-3 hover:bg-indigo-500/10 rounded-full"><Icon name="edit" /></button>
                                                <button onClick={() => delE(e.id)} className="text-red-400 p-3 hover:bg-red-500/10 rounded-full"><Icon name="trash-2" /></button>
                                            </div>
                                        </div>
                                    </GlassCard>
                                ))}
                            </div>
                        )}

                        {tab === 'manage' && (
                            <div className="space-y-6">
                                <GlassCard className="p-10 flex gap-4">
                                    <input className="flex-1 bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600" placeholder="اسم المادة" value={newSub} onChange={e => setNewSub(e.target.value)} />
                                    <Button onClick={addS}>إضافة</Button>
                                </GlassCard>
                                <div className="grid grid-cols-2 gap-4">
                                    {subjects.map(s => (
                                        <GlassCard key={s.id} className="p-6 flex justify-between items-center">
                                            {editSubId === s.id ? (
                                                <div className="flex-1 flex gap-2">
                                                    <input className="flex-1 bg-white/5 border-2 border-white/10 rounded-lg px-3 py-1 outline-none focus:border-indigo-600" value={editSubName} onChange={e => setEditSubName(e.target.value)} />
                                                    <button onClick={() => saveEditSub(s.id)} className="text-green-500"><Icon name="check" /></button>
                                                </div>
                                            ) : (
                                                <>
                                                    <span className="font-black text-lg">{s.name}</span>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => {setEditSubId(s.id); setEditSubName(s.name);}} className="text-indigo-400 p-2"><Icon name="edit-2" size={18}/></button>
                                                        <button onClick={() => delS(s.id)} className="text-red-400 p-2"><Icon name="trash-2" size={18}/></button>
                                                    </div>
                                                </>
                                            )}
                                        </GlassCard>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'add' && (
                            <div className="space-y-8">
                                <GlassCard className="p-10">
                                    <h3 className="text-3xl font-black mb-8">{editingExamId ? 'تعديل الامتحان' : 'رفع امتحان'}</h3>
                                    <div className="grid grid-cols-2 gap-6 mb-10">
                                        <select className="bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none text-white font-bold" value={selSub} onChange={e => setSelSub(e.target.value)}>
                                            <option value="">اختر المادة</option>
                                            {subjects.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                        <input className="bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600 font-bold" placeholder="عنوان الامتحان" value={eTitle} onChange={e => setETitle(e.target.value)} />
                                    </div>

                                    <div className="space-y-6 border-t-2 border-white/5 pt-10">
                                        <div className="flex gap-4">
                                            {['mcq', 'tf', 'essay'].map(t => <button key={t} onClick={() => setQType(t)} className={`px-6 py-2 rounded-xl font-bold transition-all ${qType === t ? 'bg-indigo-600 text-white' : 'bg-white/5 opacity-50'}`}>{t.toUpperCase()}</button>)}
                                        </div>
                                        <input className="w-full bg-white/5 border-2 border-white/10 rounded-2xl px-8 py-5 outline-none focus:border-indigo-600 text-xl font-bold" placeholder="السؤال.." value={qt} onChange={e => setQt(e.target.value)} />
                                        
                                        {qType === 'mcq' && (
                                            <>
                                                <div className="grid grid-cols-2 gap-6">
                                                    {['A', 'B', 'C', 'D'].map((l, i) => (
                                                        <div key={l} className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border-2 border-white/10">
                                                            <span className="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-black">{l}</span>
                                                            <input className="flex-1 bg-transparent outline-none font-bold" placeholder={`خيار ${l}`} value={qo[i]} onChange={e => {
                                                                const c = [...qo]; c[i] = e.target.value; setQo(c);
                                                            }} />
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="grid grid-cols-2 gap-6">
                                                    <select className="bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none text-white font-black" value={qc} onChange={e => setQc(e.target.value)}>
                                                        {['A', 'B', 'C', 'D'].map(l => <option key={l} value={l}>الإجابة {l}</option>)}
                                                    </select>
                                                    <input className="bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600 font-bold" placeholder="تفسير" value={qe} onChange={e => setQe(e.target.value)} />
                                                </div>
                                            </>
                                        )}
                                        {qType === 'tf' && (
                                            <div className="grid grid-cols-2 gap-6">
                                                <select className="bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none text-white font-black" value={qcTf} onChange={e => setQcTf(e.target.value)}><option value="صح">صح</option><option value="خطأ">خطأ</option></select>
                                                <input className="bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600 font-bold" placeholder="تفسير" value={qe} onChange={e => setQe(e.target.value)} />
                                            </div>
                                        )}
                                        {qType === 'essay' && (
                                            <div className="grid grid-cols-1 gap-6">
                                                <textarea className="bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600 font-bold h-32" placeholder="الإجابة النموذجية" value={qeModel} onChange={e => setQeModel(e.target.value)} />
                                                <input className="bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-600 font-bold" placeholder="تفسير" value={qe} onChange={e => setQe(e.target.value)} />
                                            </div>
                                        )}
                                        <Button onClick={addQ} variant="secondary" className="w-full py-5 text-xl">إضافة السؤال</Button>
                                    </div>
                                </GlassCard>

                                {qs.length > 0 && (
                                    <GlassCard className="p-10 text-center border-2 border-indigo-600">
                                        <div className="flex justify-between items-center mb-6">
                                            <p className="font-black text-2xl text-indigo-600">المسودة: {qs.length} سؤال</p>
                                            {editingExamId && <button onClick={cancelEditE} className="text-red-500 font-bold">إلغاء التعديل</button>}
                                        </div>
                                        <Button onClick={saveE} className="w-full py-6 text-2xl">{editingExamId ? 'حفظ التعديلات' : 'نشر الامتحان'}</Button>
                                    </GlassCard>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
