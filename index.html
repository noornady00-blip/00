    <script>
        if (!window.Motion && window.FramerMotion) window.Motion = window.FramerMotion;

    <style>
        :root {

            --bg-card: rgba(255,255,255,0.04);

            --text-secondary: rgba(240,244,255,0.45);
            --text-muted: rgba(240,244,255,0.22);
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.25);
            --accent-soft: rgba(99,102,241,0.12);
            --shadow-card: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
        }

        .bg-mesh { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

        @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(-3%,4%) scale(1.05); } }
        @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(3%,-3%) scale(1.08); } }
        .glass { background: var(--bg-card); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--border); box-shadow: var(--shadow-card); transition: background 0.3s, border-color 0.3s; }
        .glass-nav { background: rgba(8,12,20,0.8); backdrop-filter: blur(24px); border: 1px solid var(--border); }
        .light-mode .glass-nav { background: rgba(240,242,248,0.88); }
        .glow-border { box-shadow: var(--shadow-card), var(--shadow-glow), 0 0 0 1px var(--border-bright); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 10px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .progress-bar { height: 3px; background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4); background-size: 200% 100%; animation: shimmer 3s linear infinite; border-radius: 2px; }
        .badge-pro { background: var(--accent-soft); border: 1px solid var(--border-bright); color: var(--accent); font-size: 10px; font-weight: 900; letter-spacing: .08em; padding: 2px 10px; border-radius: 99px; text-transform: uppercase; display: inline-block; }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }
        .subject-card { transition: transform .35s cubic-bezier(.22,.68,0,1.2), box-shadow .35s ease; }
        .subject-card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--shadow-card), var(--shadow-glow); }
        .subject-card:active { transform: scale(0.97); }
        .input-pro { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); transition: border-color .2s, box-shadow .2s; outline: none; }
        .input-pro:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .input-pro::placeholder { color: var(--text-muted); }
        .navbar-custom { z-index: 100 !important; }
        .content-custom { z-index: 10 !important; position: relative; }
        @keyframes draw-circle { from { stroke-dashoffset: 283; } to { stroke-dashoffset: var(--offset); } }
        .score-ring { animation: draw-circle 1.2s cubic-bezier(.22,.68,0,1.2) forwards .3s; }
        @media (max-width: 640px) { .text-5xl { font-size: 2rem !important; } .text-4xl { font-size: 1.7rem !important; } }
        select option { background: #1e293b; color: #f0f4ff; }
    </style>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH2sWs7zmP_yuTF2TrsaXEqDAjchxm9Rk",
            authDomain: "project-2900514498359875554.firebaseapp.com",
            projectId: "project-2900514498359875554",
            storageBucket: "project-2900514498359875554.firebasestorage.app",
            messagingSenderId: "747587244212",
            appId: "1:747587244212:web:87e7fdb95985604dde87e1"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        const auth = getAuth(app);

        // Sign in anonymously so Firestore rules allow read/write
        signInAnonymously(auth).catch(e => console.warn('anon auth:', e));

        // Expose helpers on window so Babel script can use them
        window.FS = {
            db, auth,
            col:  (...p) => collection(db, ...p),
            doc:  (...p) => doc(db, ...p),
            add:  (ref, d) => addDoc(ref, { ...d, createdAt: serverTimestamp() }),
            set:  (ref, d) => updateDoc(ref, d),
            del:  (ref)   => deleteDoc(ref),
            snap: (ref, cb, err) => onSnapshot(ref, cb, err || console.warn),
        };
        window.dispatchEvent(new Event('fs-ready'));
    </script>

    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;
    const MotionLib = window.Motion || window.FramerMotion || {};
    const motion = MotionLib.motion || MotionLib.m || {};
    const AnimatePresence = MotionLib.AnimatePresence || (({ children }) => children);

/* ─── Firebase DB helpers ──────────────────────────────────────────── */
    // Wait for the Firebase module script to expose window.FS
    function waitFS() {
        return new Promise(resolve => {
            if (window.FS) { resolve(window.FS); return; }
            window.addEventListener('fs-ready', () => resolve(window.FS), { once: true });
        });
    }

    // Firebase helper functions — col is top-level collection name e.g. 'subjects'
    async function dbAdd(col, data) {
        const fs = await waitFS();
        return fs.add(fs.col(col), data);
    }
    async function dbUpdate(col, id, data) {
        const fs = await waitFS();
        return fs.set(fs.doc(col, id), data);
    }
    async function dbRemove(col, id) {
        const fs = await waitFS();
        return fs.del(fs.doc(col, id));
    }
    function dbListen(col, cb) {
        waitFS().then(fs => fs.snap(fs.col(col), snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() })))));
    }

    /* ─── Shared Components ─────────────────────────────────────────────── */
    const GlassCard = ({ children, className = "" }) => (
        <div className={`glass rounded-2xl ${className}`}>{children}</div>
    );

    const Button = ({ children, onClick, variant = "primary", className = "", disabled = false }) => {
        const vars = {
            primary: "bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-900/40",
            secondary: "input-pro hover:border-indigo-500/40",
            danger: "bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20",
        };
        return (
            <button disabled={disabled} onClick={onClick}
                className={`relative px-6 py-2.5 rounded-xl font-bold transition-all duration-200 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed ${vars[variant]} ${className}`}>
                {children}
            </button>
        );
    };

    const Icon = ({ name, size = 20, className = "", style: s }) => (
        <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block', ...s }}></i>
    );

    const refreshIcons = () => { if (window.lucide) window.lucide.createIcons(); };

    /* ─── MathText Component (KaTeX) ─────────────────────────────────────── */
    function MathText({ children, block = false }) {
        const ref = React.useRef(null);
        useEffect(() => {
            if (!ref.current || !window.renderMathInElement) return;
            renderMathInElement(ref.current, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true },
                ],
                throwOnError: false,
            });
        }, [children]);
        return (
            <span ref={ref} style={{ display: block ? 'block' : 'inline' }}>
                {children}
            </span>
        );
    }


        /* ─── Student App ──────────────────────────────────────────────────── */
    function App() {
        const [darkMode, setDarkMode] = useState(true);
        const [view, setView] = useState('home');
        const [subjects, setSubjects] = useState([]);
        const [exams, setExams] = useState([]);
        const [notifications, setNotifications] = useState([]);
        const [readNotifications, setReadNotifications] = useState(() => JSON.parse(localStorage.getItem('read_notifs') || '[]'));
        const [activeSubject, setActiveSubject] = useState(null);
        const [currentExamData, setCurrentExamData] = useState(null);
        const [showNotificationCenter, setShowNotificationCenter] = useState(false);

        useEffect(() => {
            dbListen('subjects',      data => setSubjects(data));
            dbListen('exams',         data => setExams(data));
            dbListen('notifications', data => setNotifications(data));
        }, []);

        useEffect(() => { refreshIcons(); }, [view, subjects, exams, showNotificationCenter, darkMode]);
        useEffect(() => { document.body.classList.toggle('light-mode', !darkMode); }, [darkMode]);

        const markNotifRead = (id) => {
            const updated = [...readNotifications, id];
            setReadNotifications(updated);
            localStorage.setItem('read_notifs', JSON.stringify(updated));
        };
        const unreadNotifs = notifications.filter(n => !readNotifications.includes(n.id));

        return (
            <div className="min-h-screen" style={{ background: 'var(--bg-primary)', color: 'var(--text-primary)' }}>
                <div className="bg-mesh" />

                {/* NAVBAR */}
                <nav className="sticky top-0 navbar-custom px-3 py-2.5 md:px-5 md:py-3">
                    <div className="glass-nav max-w-7xl mx-auto rounded-2xl flex items-center justify-between px-4 md:px-6 py-3">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                            <div className="relative w-9 h-9">
                                <div className="absolute inset-0 rounded-xl bg-indigo-600 opacity-20 blur-sm" />
                                <div className="relative w-9 h-9 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center shadow-lg">
                                    <Icon name="graduation-cap" size={18} className="text-white" />
                                </div>
                            </div>
                            <div>
                                <h1 className="text-base font-black leading-none tracking-tight">Nour Nady</h1>
                                <span className="badge-pro">Pro</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-1.5 md:gap-2">
                            <div className="relative">
                                <button onClick={() => setShowNotificationCenter(!showNotificationCenter)}
                                    className="relative w-9 h-9 rounded-xl flex items-center justify-center hover:bg-white/5"
                                    style={{ color: 'var(--text-secondary)' }}>
                                    <Icon name="bell" size={18} />
                                    {unreadNotifs.length > 0 && (
                                        <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full">
                                            <span className="absolute inset-0 rounded-full bg-red-500 animate-ping opacity-75" />
                                        </span>
                                    )}
                                </button>
                                <AnimatePresence>
                                    {showNotificationCenter && (
                                        <motion.div initial={{ opacity: 0, y: 10, scale: 0.96 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 10, scale: 0.96 }}
                                            className="absolute left-0 mt-3 w-72 z-50">
                                            <GlassCard className="p-4 custom-scrollbar" style={{ maxHeight: 360, overflowY: 'auto', border: '1px solid var(--border-bright)' }}>
                                                <div className="flex justify-between items-center mb-3 pb-3" style={{ borderBottom: '1px solid var(--border)' }}>
                                                    <span className="text-xs font-black">الإشعارات</span>
                                                    {unreadNotifs.length > 0 && <span className="badge-pro">{unreadNotifs.length} جديد</span>}
                                                </div>
                                                {unreadNotifs.length === 0
                                                    ? <p className="text-xs text-center py-8" style={{ color: 'var(--text-muted)' }}>كل شيء هادئ هنا ✨</p>
                                                    : unreadNotifs.map(n => (
                                                        <div key={n.id} onClick={() => markNotifRead(n.id)}
                                                            className="p-3 rounded-xl cursor-pointer mb-1.5"
                                                            style={{ background: 'var(--accent-soft)', border: '1px solid var(--border)' }}>
                                                            <div className="flex items-start gap-2.5">
                                                                <div className="w-1.5 h-1.5 rounded-full bg-indigo-400 mt-1.5 shrink-0" />
                                                                <div>
                                                                    <p className="text-xs font-bold mb-0.5">{n.title}</p>
                                                                    <p className="text-xs leading-relaxed" style={{ color: 'var(--text-secondary)' }}>{n.message}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))
                                                }
                                            </GlassCard>
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </div>
                            <button onClick={() => setDarkMode(!darkMode)}
                                className="w-9 h-9 rounded-xl flex items-center justify-center hover:bg-white/5"
                                style={{ color: 'var(--text-secondary)' }}>
                                {darkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}
                            </button>
                        </div>
                    </div>
                </nav>

                <main className="max-w-7xl mx-auto px-4 md:px-8 py-8 content-custom">
                    <AnimatePresence mode="wait">

                        {view === 'home' && (
                            <motion.div key="home" initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -16 }} transition={{ duration: 0.3 }}>
                                <div className="mb-12">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="w-8 h-px" style={{ background: 'var(--accent)' }} />
                                        <span className="badge-pro">منصة الامتحانات</span>
                                    </div>
                                    <h2 className="text-4xl md:text-5xl font-black mb-3 leading-tight">
                                        أهلاً بك في{' '}
                                        <span style={{ background: 'linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>مستقبلك</span>
                                    </h2>
                                    <p className="text-lg font-medium" style={{ color: 'var(--text-secondary)' }}>اختر المادة وابدأ رحلة التفوق</p>
                                </div>
                                {subjects.length > 0 && (
                                    <div className="flex items-center gap-6 mb-10 flex-wrap">
                                        <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-400" /><span className="text-sm font-bold" style={{ color: 'var(--text-secondary)' }}>{subjects.length} مادة</span></div>
                                        <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-violet-400" /><span className="text-sm font-bold" style={{ color: 'var(--text-secondary)' }}>{exams.length} امتحان</span></div>
                                    </div>
                                )}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {subjects.map((s, i) => (
                                        <motion.div key={s.id} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.07 }}
                                            onClick={() => { setActiveSubject(s); setView('exam-list'); }} className="cursor-pointer subject-card">
                                            <GlassCard className="p-7 h-full flex flex-col justify-between" style={{ borderRight: '3px solid var(--accent)' }}>
                                                <div>
                                                    <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-5" style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}>
                                                        <Icon name="file-text" size={22} />
                                                    </div>
                                                    <h3 className="text-xl font-black mb-1.5">{s.name}</h3>
                                                    <p className="text-xs font-medium" style={{ color: 'var(--text-muted)' }}>{exams.filter(e => e.subjectId === s.id).length} امتحان متاح</p>
                                                </div>
                                                <div className="mt-6 flex items-center justify-between">
                                                    <span className="text-xs font-bold" style={{ color: 'var(--accent)' }}>اكتشف الامتحانات</span>
                                                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}><Icon name="chevron-left" size={16} /></div>
                                                </div>
                                            </GlassCard>
                                        </motion.div>
                                    ))}
                                    {subjects.length === 0 && (
                                        <div className="col-span-full py-24 text-center">
                                            <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style={{ background: 'var(--bg-card)' }}>
                                                <Icon name="book-open" size={28} style={{ color: 'var(--text-muted)' }} />
                                            </div>
                                            <p className="font-bold text-sm" style={{ color: 'var(--text-muted)' }}>لا توجد مواد بعد.</p>
                                        </div>
                                    )}
                                </div>
                            </motion.div>
                        )}

                        {view === 'exam-list' && (
                            <motion.div key="exam-list" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} transition={{ duration: 0.3 }}>
                                <button onClick={() => setView('home')} className="flex items-center gap-2 mb-8 text-sm font-bold" style={{ color: 'var(--text-secondary)' }}>
                                    <Icon name="chevron-right" size={16} /> العودة
                                </button>
                                <div className="flex items-center gap-3 mb-2"><div className="w-8 h-px" style={{ background: 'var(--accent)' }} /><span className="badge-pro">المادة</span></div>
                                <h2 className="text-3xl md:text-4xl font-black mb-10">{activeSubject?.name}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {exams.filter(e => e.subjectId === activeSubject?.id).map((e, i) => (
                                        <motion.div key={e.id} initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.07 }} className="subject-card">
                                            <GlassCard className="p-6 flex flex-col h-full">
                                                <div className="flex items-start justify-between mb-4">
                                                    <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}><Icon name="file-check" size={20} /></div>
                                                    <span className="badge-pro">{e.questions?.length || 0} سؤال</span>
                                                </div>
                                                <h3 className="text-lg font-black mb-3 flex-1">{e.title}</h3>
                                                <div className="flex items-center gap-4 mb-5" style={{ color: 'var(--text-muted)' }}>
                                                    <span className="flex items-center gap-1.5 text-xs font-bold"><Icon name="clock" size={12} /> {(e.questions?.length || 0) * 2} دقيقة</span>
                                                    <span className="flex items-center gap-1.5 text-xs font-bold"><Icon name="users" size={12} /> {e.entryCount || 0} دخول</span>
                                                </div>
                                                <div className="divider mb-5" />
                                                <Button onClick={() => { setCurrentExamData(e); setView('taking-exam'); }} className="w-full py-3 text-sm">
                                                    <span className="flex items-center justify-center gap-2">ابدأ الامتحان <Icon name="arrow-left" size={14} /></span>
                                                </Button>
                                            </GlassCard>
                                        </motion.div>
                                    ))}
                                    {exams.filter(e => e.subjectId === activeSubject?.id).length === 0 && (
                                        <p className="col-span-full text-center py-16 font-bold text-sm" style={{ color: 'var(--text-muted)' }}>لا توجد امتحانات متاحة حالياً.</p>
                                    )}
                                </div>
                            </motion.div>
                        )}

                        {view === 'taking-exam' && (
                            <ExamRunner exam={currentExamData} onFinish={(res) => { setView('results'); setCurrentExamData({ ...currentExamData, results: res }); }} />
                        )}
                        {view === 'results' && <ExamResultView data={currentExamData} onClose={() => setView('home')} />}

                    </AnimatePresence>
                </main>
            </div>
        );
    }
/* ─── ExamRunner ─────────────────────────────────────────────────────── */
    function ExamRunner({ exam, onFinish }) {
        const [idx, setIdx] = useState(0);
        const [ans, setAns] = useState({});
        const [sec, setSec] = useState(0);

        useEffect(() => { const t = setInterval(() => setSec(s => s + 1), 1000); return () => clearInterval(t); }, []);
        useEffect(() => { refreshIcons(); }, [idx]);

        const format = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

        const finish = () => {
            const report = exam.questions.map((q, i) => {
                const isCorrect = q.type === 'essay'
                    ? (ans[i] || '').trim().toLowerCase() === (q.correct || '').trim().toLowerCase()
                    : ans[i] === q.correct;
                return { ...q, userAnswer: ans[i], isCorrect };
            });
            const score = report.filter(r => r.isCorrect).length;
            dbUpdate('exams', exam.id, { entryCount: (exam.entryCount || 0) + 1 });
            onFinish({ score, total: exam.questions.length, report, time: format(sec) });
        };

        const q = exam.questions[idx];
        const abcd = ['A','B','C','D'];
        const progress = ((idx + 1) / exam.questions.length) * 100;

        return (
            <motion.div key="exam" initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} className="max-w-2xl mx-auto">
                <div className="flex justify-between items-center mb-6">
                    <GlassCard className="px-4 py-2 flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full bg-indigo-400 animate-pulse" />
                        <span className="font-black text-sm" style={{ color: 'var(--accent)' }}>{format(sec)}</span>
                    </GlassCard>
                    <div className="flex items-center gap-3">
                        <span className="text-xs font-bold" style={{ color: 'var(--text-muted)' }}>{idx + 1} / {exam.questions.length}</span>
                        <GlassCard className="px-3 py-1.5"><span className="text-xs font-black" style={{ color: 'var(--text-secondary)' }}>{exam.title}</span></GlassCard>
                    </div>
                </div>

                <div className="mb-6 rounded-full overflow-hidden" style={{ height: 3, background: 'var(--border)' }}>
                    <div className="progress-bar transition-all duration-500" style={{ width: `${progress}%` }} />
                </div>

                <GlassCard className="p-6 md:p-8 mb-6" style={{ borderTop: '2px solid var(--accent)', minHeight: 420 }}>
                    <div className="flex items-center gap-2 mb-6">
                        <span className="badge-pro">{q.type === 'mcq' ? 'اختيار متعدد' : q.type === 'tf' ? 'صح / خطأ' : 'مقالي'}</span>
                    </div>
                    <h3 className="text-lg md:text-2xl font-black mb-8 leading-relaxed text-right"><MathText>{q.text}</MathText></h3>
                    <div className="grid gap-3">
                        {(!q.type || q.type === 'mcq') && q.options.map((opt, i) => {
                            const selected = ans[idx] === abcd[i];
                            return (
                                <button key={i} onClick={() => setAns({...ans, [idx]: abcd[i]})}
                                    className="w-full p-4 rounded-xl border-2 transition-all duration-200 flex items-center gap-4"
                                    style={{ background: selected ? 'var(--accent)' : 'var(--bg-card)', borderColor: selected ? 'var(--accent)' : 'var(--border)', color: selected ? '#fff' : 'var(--text-primary)' }}>
                                    <span className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm shrink-0"
                                        style={{ background: selected ? 'rgba(255,255,255,0.2)' : 'var(--accent-soft)', color: selected ? '#fff' : 'var(--accent)' }}>{abcd[i]}</span>
                                    <span className="font-bold flex-1 text-right"><MathText>{opt}</MathText></span>
                                    {selected && <Icon name="check-circle-2" size={18} />}
                                </button>
                            );
                        })}
                        {q.type === 'tf' && ['صح','خطأ'].map((opt) => {
                            const selected = ans[idx] === opt;
                            const color = opt === 'صح' ? '#10b981' : '#f43f5e';
                            return (
                                <button key={opt} onClick={() => setAns({...ans, [idx]: opt})}
                                    className="w-full p-4 rounded-xl border-2 transition-all flex items-center justify-between"
                                    style={{ background: selected ? `${color}18` : 'var(--bg-card)', borderColor: selected ? color : 'var(--border)', color: selected ? color : 'var(--text-primary)' }}>
                                    <span className="font-black text-lg"><MathText>{opt}</MathText></span>
                                    {selected && <Icon name="check-circle-2" size={18} />}
                                </button>
                            );
                        })}
                        {q.type === 'essay' && (
                            <textarea className="w-full rounded-xl p-4 input-pro text-base font-bold h-40 custom-scrollbar resize-none"
                                placeholder="اكتب إجابتك هنا..." value={ans[idx] || ''} onChange={e => setAns({...ans, [idx]: e.target.value})} />
                        )}
                    </div>
                </GlassCard>

                <div className="flex justify-between gap-4">
                    <Button variant="secondary" onClick={() => setIdx(p => p - 1)} disabled={idx === 0} className="px-8 py-3 input-pro">
                        <span className="flex items-center gap-2"><Icon name="chevron-right" size={16} /> السابق</span>
                    </Button>
                    {idx === exam.questions.length - 1
                        ? <Button onClick={finish} className="px-10 py-3 flex-1"><span className="flex items-center justify-center gap-2">إرسال الإجابات <Icon name="send" size={16} /></span></Button>
                        : <Button onClick={() => setIdx(p => p + 1)} className="px-10 py-3"><span className="flex items-center gap-2">التالي <Icon name="chevron-left" size={16} /></span></Button>
                    }
                </div>
            </motion.div>
        );
    }

    /* ─── ExamResultView ─────────────────────────────────────────────────── */
    function ExamResultView({ data, onClose }) {
        const { results } = data;
        const percent = Math.round((results.score / results.total) * 100);
        const strokeDash = 283;
        const offset = strokeDash - (strokeDash * percent / 100);
        useEffect(() => { refreshIcons(); }, []);

        const grade = percent >= 90 ? { label: 'ممتاز', color: '#10b981' }
            : percent >= 75 ? { label: 'جيد جداً', color: '#6366f1' }
            : percent >= 60 ? { label: 'جيد', color: '#f59e0b' }
            : { label: 'يحتاج مراجعة', color: '#f43f5e' };

        return (
            <motion.div key="results" initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }} className="max-w-3xl mx-auto pb-20">
                <GlassCard className="p-8 md:p-12 mb-10 text-center glow-border">
                    <motion.div initial={{ scale: 0, rotate: -10 }} animate={{ scale: 1, rotate: 0 }} transition={{ type: 'spring', stiffness: 200, delay: 0.1 }} className="inline-block mb-6">
                        <svg width="120" height="120" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border)" strokeWidth="6" />
                            <circle cx="50" cy="50" r="45" fill="none" stroke={grade.color} strokeWidth="6" strokeLinecap="round"
                                strokeDasharray={strokeDash} strokeDashoffset={offset} className="score-ring"
                                style={{ '--offset': offset, transform: 'rotate(-90deg)', transformOrigin: 'center' }} />
                            <text x="50" y="45" textAnchor="middle" fill="var(--text-primary)" fontSize="20" fontWeight="900" fontFamily="Cairo">{percent}%</text>
                            <text x="50" y="62" textAnchor="middle" fill="var(--text-muted)" fontSize="9" fontFamily="Cairo">{results.score}/{results.total}</text>
                        </svg>
                    </motion.div>
                    <h2 className="text-3xl md:text-4xl font-black mb-2">مبارك الإنجاز!</h2>
                    <div className="flex items-center justify-center gap-2 mb-6">
                        <span className="badge-pro" style={{ background: `${grade.color}18`, borderColor: grade.color, color: grade.color }}>{grade.label}</span>
                    </div>
                    <div className="flex justify-center gap-8">
                        <div className="text-center"><p className="text-xs font-bold mb-1" style={{ color: 'var(--text-muted)' }}>الإجابات الصحيحة</p><p className="text-2xl font-black" style={{ color: '#10b981' }}>{results.score}</p></div>
                        <div className="w-px self-stretch" style={{ background: 'var(--border)' }} />
                        <div className="text-center"><p className="text-xs font-bold mb-1" style={{ color: 'var(--text-muted)' }}>الإجابات الخاطئة</p><p className="text-2xl font-black" style={{ color: '#f43f5e' }}>{results.total - results.score}</p></div>
                        <div className="w-px self-stretch" style={{ background: 'var(--border)' }} />
                        <div className="text-center"><p className="text-xs font-bold mb-1" style={{ color: 'var(--text-muted)' }}>الوقت</p><p className="text-2xl font-black" style={{ color: 'var(--accent)' }}>{results.time}</p></div>
                    </div>
                </GlassCard>

                <div className="flex items-center gap-3 mb-6"><Icon name="eye" size={18} style={{ color: 'var(--accent)' }} /><h3 className="text-lg font-black">مراجعة الأداء</h3></div>

                <div className="space-y-5">
                    {results.report.map((r, i) => (
                        <motion.div key={i} initial={{ opacity: 0, y: 12 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.05 }}>
                            <GlassCard className="p-6" style={{ borderRight: `3px solid ${r.isCorrect ? '#10b981' : '#f43f5e'}` }}>
                                <div className="flex items-start justify-between gap-4 mb-5">
                                    <h4 className="text-base font-black leading-relaxed text-right flex-1"><MathText>{`${i + 1}. ${r.text}`}</MathText></h4>
                                    <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{ background: r.isCorrect ? '#10b98120' : '#f43f5e20' }}>
                                        <Icon name={r.isCorrect ? 'check' : 'x'} size={14} style={{ color: r.isCorrect ? '#10b981' : '#f43f5e' }} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                                    <div className="p-4 rounded-xl" style={{ background: r.isCorrect ? '#10b98110' : '#f43f5e10', border: `1px solid ${r.isCorrect ? '#10b98130' : '#f43f5e30'}` }}>
                                        <p className="text-[10px] font-black mb-1.5 uppercase tracking-wider" style={{ color: 'var(--text-muted)' }}>إجابتك</p>
                                        <div className="flex items-center justify-between">
                                            <span className="font-black text-sm" style={{ color: r.isCorrect ? '#10b981' : '#f43f5e' }}><MathText>{r.userAnswer || 'لا يوجد'}</MathText></span>
                                            <Icon name={r.isCorrect ? 'check-circle-2' : 'x-circle'} size={15} style={{ color: r.isCorrect ? '#10b981' : '#f43f5e' }} />
                                        </div>
                                    </div>
                                    <div className="p-4 rounded-xl" style={{ background: '#10b98110', border: '1px solid #10b98130' }}>
                                        <p className="text-[10px] font-black mb-1.5 uppercase tracking-wider" style={{ color: 'var(--text-muted)' }}>الإجابة الصحيحة</p>
                                        <span className="font-black text-sm" style={{ color: '#10b981' }}><MathText>{r.correct}</MathText></span>
                                    </div>
                                </div>
                                {r.explanation && (
                                    <div className="flex gap-3 p-4 rounded-xl" style={{ background: 'var(--accent-soft)', border: '1px solid var(--border-bright)' }}>
                                        <Icon name="info" size={15} style={{ color: 'var(--accent)', marginTop: 2, flexShrink: 0 }} />
                                        <p className="text-sm leading-relaxed italic" style={{ color: 'var(--text-secondary)' }}><MathText>{r.explanation}</MathText></p>
                                    </div>
                                )}
                            </GlassCard>
                        </motion.div>
                    ))}
                </div>
                <div className="text-center mt-12">
                    <Button onClick={onClose} className="px-16 py-3">
                        <span className="flex items-center gap-2"><Icon name="home" size={16} /> العودة للرئيسية</span>
                    </Button>
                </div>
            </motion.div>
        );
    }

    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
</html>
